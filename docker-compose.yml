services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: peersview-nextjs:latest
    container_name: peersview-nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:7
    container_name: peersview-mongo
    restart: unless-stopped
    command: ["--quiet"]
    volumes:
      - mongo_data:/data/db
    # No ports exposed — only accessible within Docker network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
